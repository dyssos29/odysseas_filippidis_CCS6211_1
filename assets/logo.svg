<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <!-- Globe -->
  <circle cx="110" cy="110" r="60" fill="#1e88e5" />

  <!-- Latitude lines -->
  <ellipse cx="110" cy="110" rx="60" ry="25" fill="none" stroke="#ffffff" stroke-width="2"/>
  <ellipse cx="110" cy="110" rx="60" ry="40" fill="none" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Longitude lines -->
  <ellipse cx="110" cy="110" rx="25" ry="60" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <ellipse cx="110" cy="110" rx="40" ry="60" fill="none" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Location pin -->
  <path d="M110 75
      C95 75, 95 95, 110 115
      C125 95, 125 75, 110 75 Z"
      fill="#ff7043"/>

  <circle cx="110" cy="95" r="5" fill="#ffffff"/>

  <!-- Sun -->
  <circle cx="155" cy="65" r="12" fill="#ffca28"/>
  <g stroke="#ffca28" stroke-width="2">
    <line x1="155" y1="45" x2="155" y2="55"/>
    <line x1="155" y1="75" x2="155" y2="85"/>
    <line x1="135" y1="65" x2="145" y2="65"/>
    <line x1="165" y1="65" x2="175" y2="65"/>
    <line x1="142" y1="52" x2="148" y2="58"/>
    <line x1="162" y1="72" x2="168" y2="78"/>
    <line x1="142" y1="78" x2="148" y2="72"/>
    <line x1="162" y1="58" x2="168" y2="52"/>
  </g>

  <!-- Cloud -->
  <ellipse cx="70" cy="70" rx="18" ry="10" fill="#ffffff"/>
  <ellipse cx="85" cy="70" rx="12" ry="8" fill="#ffffff"/>
  <ellipse cx="78" cy="62" rx="10" ry="7" fill="#ffffff"/>
</svg>